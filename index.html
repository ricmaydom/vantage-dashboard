<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vantage</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vantage">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #0f0f0f;
  --bg-surface: #181818;
  --bg-elevated: #222222;
  --bg-border: #2d2d2d;
  --text-primary: #f0f0f0;
  --text-secondary: #b0b0b0;
  --text-tertiary: #787878;
  --text-disabled: #505050;
  --accent: #c9a84c;
  --accent-hover: #e0b85c;

  --color-red: #e05252;
  --color-red-dim: rgba(224,82,82,0.15);
  --color-amber: #d4924a;
  --color-amber-dim: rgba(212,146,74,0.15);
  --color-green: #52a87c;
  --color-green-dim: rgba(82,168,124,0.15);
  --color-blue: #4a90d4;
  --color-blue-dim: rgba(74,144,212,0.15);
  --color-purple: #9b6dd4;
  --color-purple-dim: rgba(155,109,212,0.15);
  --color-teal: #3dada8;
  --color-teal-dim: rgba(61,173,168,0.15);
  --color-cyan: #4ab8d4;
  --color-cyan-dim: rgba(74,184,212,0.15);
  --color-orange: #d47a3d;
  --color-orange-dim: rgba(212,122,61,0.15);
  --color-pink: #d46da0;
  --color-pink-dim: rgba(212,109,160,0.15);
  --color-sage: #7aad80;
  --color-sage-dim: rgba(122,173,128,0.15);
  --color-slate: #8494a8;
  --color-slate-dim: rgba(132,148,168,0.15);
  --color-gold: #c9a84c;
  --color-gold-dim: rgba(201,168,76,0.15);

  --text-xs: 12px;
  --text-sm: 13px;
  --text-base: 15px;
  --text-md: 16px;
  --text-lg: 18px;
  --text-xl: 22px;
  --lh-tight: 1.3;
  --lh-base: 1.5;
  --lh-loose: 1.7;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: var(--text-base);
  line-height: var(--lh-base);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* AUTH GATE */
.auth-gate {
  position: fixed;
  inset: 0;
  background: var(--bg-base);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.auth-card {
  background: var(--bg-surface);
  border: 1px solid var(--bg-border);
  border-radius: 16px;
  width: min(380px, 94vw);
  padding: 36px 32px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.auth-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}

.auth-mark {
  width: 36px;
  height: 36px;
  background: var(--bg-base);
  border: 1px solid var(--bg-border);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  color: var(--accent);
}

.auth-mark svg {
  width: 20px;
  height: 20px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.5;
}

.auth-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--text-primary);
}

.auth-sub {
  font-size: var(--text-sm);
  color: var(--text-secondary);
  margin-top: -10px;
}

.auth-inp {
  width: 100%;
  background: var(--bg-elevated);
  border: 1px solid var(--bg-border);
  border-radius: 8px;
  padding: 10px 13px;
  color: var(--text-primary);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: var(--text-base);
  outline: none;
  transition: border-color 0.14s;
}

.auth-inp::placeholder {
  color: var(--text-disabled);
}

.auth-inp:focus {
  border-color: var(--accent);
}

.auth-btn {
  width: 100%;
  padding: 11px;
  background: var(--accent);
  color: var(--bg-base);
  border: none;
  border-radius: 8px;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: var(--text-base);
  font-weight: 600;
  cursor: pointer;
  transition: background 0.14s;
}

.auth-btn:hover {
  background: var(--accent-hover);
}

.auth-err {
  font-size: var(--text-xs);
  color: var(--color-red);
  text-align: center;
  min-height: 16px;
}

.auth-note {
  font-size: var(--text-xs);
  color: var(--text-tertiary);
  text-align: center;
  line-height: var(--lh-base);
}

/* APP LAYOUT */
.app {
  display: flex;
  height: 100dvh;
  width: 100vw;
  overflow: hidden;
}

.sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--bg-surface);
  border-right: 1px solid var(--bg-border);
  display: flex;
  flex-direction: column;
  transition: width 0.28s cubic-bezier(0.16, 1, 0.3, 1), min-width 0.28s cubic-bezier(0.16, 1, 0.3, 1);
  overflow: hidden;
  position: relative;
  z-index: 20;
}

.sidebar.collapsed {
  width: 56px;
  min-width: 56px;
}

.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 12px 11px;
  border-bottom: 1px solid var(--bg-border);
  min-height: 55px;
}

.workspace-mark {
  display: flex;
  align-items: center;
  gap: 9px;
  white-space: nowrap;
  overflow: hidden;
  cursor: pointer;
}

.mark-icon {
  width: 28px;
  height: 28px;
  min-width: 28px;
  background: var(--bg-base);
  border: 1px solid var(--bg-border);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-weight: 600;
  color: var(--accent);
}

.mark-icon svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
}

.mark-text {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: opacity 0.2s, width 0.28s cubic-bezier(0.16, 1, 0.3, 1);
}

.mark-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  line-height: 1.2;
}

.mark-sub {
  font-size: var(--text-xs);
  font-weight: 400;
  color: var(--text-tertiary);
  white-space: nowrap;
  margin-top: 1px;
}

.sidebar.collapsed .mark-text,
.sidebar.collapsed .nav-list,
.sidebar.collapsed .nav-section {
  opacity: 0;
  width: 0;
  overflow: hidden;
  pointer-events: none;
}

.collapse-btn {
  width: 26px;
  height: 26px;
  flex-shrink: 0;
  border: 1px solid var(--bg-border);
  background: var(--bg-elevated);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-tertiary);
  transition: all 0.14s;
  padding: 0;
}

.collapse-btn:hover {
  background: var(--bg-border);
  color: var(--text-primary);
}

.collapse-btn svg {
  width: 14px;
  height: 14px;
  stroke: currentColor;
  stroke-width: 2;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1);
}

.sidebar.collapsed .collapse-btn svg {
  transform: rotate(180deg);
}

.briefing-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  margin: 10px 10px 3px;
  background: var(--color-gold-dim);
  border: 1px solid var(--color-gold);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.14s;
  white-space: nowrap;
  overflow: hidden;
}

.briefing-pill:hover {
  background: rgba(201, 168, 76, 0.25);
}

.briefing-dot {
  width: 5px;
  height: 5px;
  min-width: 5px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 2.4s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.briefing-text {
  font-size: var(--text-xs);
  font-weight: 500;
  color: var(--accent-hover);
}

.sidebar.collapsed .briefing-text {
  display: none;
}

.nav-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 6px 0;
  scrollbar-width: none;
  transition: opacity 0.2s, width 0.28s cubic-bezier(0.16, 1, 0.3, 1);
}

.nav-list::-webkit-scrollbar {
  display: none;
}

.nav-section {
  font-size: var(--text-xs);
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  padding: 8px 14px 3px;
  white-space: nowrap;
  transition: opacity 0.2s;
}

.nav-group {
  padding: 2px 0;
}

.nav-group + .nav-group {
  border-top: 1px solid var(--bg-border);
  margin-top: 3px;
  padding-top: 5px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 10px;
  margin: 1px 7px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text-secondary);
  white-space: nowrap;
  transition: background 0.12s, color 0.12s;
  position: relative;
  font-size: var(--text-sm);
  font-weight: 400;
}

.nav-item:hover {
  background: var(--bg-elevated);
  color: var(--text-primary);
}

.nav-item.active {
  background: var(--color-gold-dim);
  color: var(--accent-hover);
  border: 1px solid rgba(201, 168, 76, 0.3);
}

.nav-item.active .nav-icon {
  background: rgba(201, 168, 76, 0.25);
}

.nav-icon {
  width: 28px;
  height: 28px;
  min-width: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.12s;
}

.nav-icon svg {
  width: 15px;
  height: 15px;
  stroke: currentColor;
  stroke-width: 1.6;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.nav-label {
  flex: 1;
  overflow: hidden;
}

.nav-badge {
  margin-left: auto;
  font-size: var(--text-xs);
  font-weight: 600;
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  padding: 1px 5px;
  border-radius: 10px;
  min-width: 17px;
  text-align: center;
  flex-shrink: 0;
  background: var(--accent);
  color: var(--bg-base);
  transition: opacity 0.2s;
}

.nav-badge.alert {
  background: var(--color-red);
  color: #fff;
}

.sidebar.collapsed .nav-badge {
  opacity: 0;
}

.nav-item::after {
  content: attr(data-tip);
  position: absolute;
  left: calc(56px - 4px);
  top: 50%;
  transform: translateY(-50%);
  background: var(--bg-elevated);
  color: var(--text-primary);
  font-size: var(--text-xs);
  font-weight: 500;
  white-space: nowrap;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--bg-border);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.14s;
  z-index: 100;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
}

.sidebar.collapsed .nav-item:hover::after {
  opacity: 1;
}

.sidebar-footer {
  border-top: 1px solid var(--bg-border);
  padding: 6px;
  display: flex;
  gap: 4px;
}

.footer-btn {
  flex: 1;
  padding: 7px;
  background: var(--bg-elevated);
  border: 1px solid var(--bg-border);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.14s;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
}

.footer-btn:hover {
  background: var(--bg-border);
  color: var(--text-primary);
}

.footer-btn svg {
  width: 14px;
  height: 14px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.6;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.main-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--bg-border);
  background: var(--bg-surface);
  min-height: 50px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-title {
  font-size: var(--text-lg);
  font-weight: 600;
  color: var(--text-primary);
}

.granola-status {
  font-size: var(--text-xs);
  color: var(--text-tertiary);
  padding: 4px 8px;
  background: var(--bg-base);
  border-radius: 4px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-btn {
  width: 32px;
  height: 32px;
  border: 1px solid var(--bg-border);
  background: var(--bg-elevated);
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  transition: all 0.14s;
  padding: 0;
}

.header-btn:hover {
  background: var(--bg-border);
  color: var(--text-primary);
}

.header-btn svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.6;
}

.content {
  flex: 1;
  overflow: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--bg-border) transparent;
}

.content::-webkit-scrollbar {
  width: 8px;
}

.content::-webkit-scrollbar-track {
  background: transparent;
}

.content::-webkit-scrollbar-thumb {
  background: var(--bg-border);
  border-radius: 4px;
}

.content::-webkit-scrollbar-thumb:hover {
  background: var(--bg-elevated);
}

.content-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
  display: grid;
  gap: 16px;
}

.content-inner.full-width {
  max-width: none;
}

.content-inner.two-col {
  grid-template-columns: 1fr 1fr;
}

/* CARD */
.card {
  background: var(--bg-surface);
  border: 1px solid var(--bg-border);
  border-radius: 12px;
  overflow: hidden;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--bg-border);
  min-height: 44px;
}

.card-title {
  font-size: var(--text-md);
  font-weight: 600;
  color: var(--text-primary);
}

.card-header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-body {
  padding: 12px 0;
}

.card-body.collapsed {
  display: none;
}

.card-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--bg-border);
  display: flex;
  gap: 8px;
}

.toggle-btn {
  width: 24px;
  height: 24px;
  border: none;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  padding: 0;
}

.toggle-btn svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.6;
  transition: transform 0.2s;
}

.toggle-btn.collapsed svg {
  transform: rotate(-90deg);
}

/* ROWS */
.row {
  padding: 12px 16px;
  border-bottom: 1px solid var(--bg-border);
  cursor: pointer;
  transition: background 0.12s;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: var(--text-base);
}

.row:last-child {
  border-bottom: none;
}

.row:hover {
  background: var(--bg-elevated);
}

.row.clickable {
  cursor: pointer;
}

.row-primary {
  color: var(--text-primary);
  font-weight: 500;
  flex: 1;
  font-size: var(--text-base);
}

.row-secondary {
  color: var(--text-secondary);
  font-size: var(--text-sm);
}

.row-meta {
  color: var(--text-tertiary);
  font-size: var(--text-xs);
  white-space: nowrap;
}

.row-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: var(--text-xs);
  font-weight: 500;
  white-space: nowrap;
  flex-shrink: 0;
}

/* INPUTS */
.input-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}

.input-label {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

input[type="text"],
input[type="email"],
input[type="tel"],
input[type="date"],
textarea,
select {
  width: 100%;
  padding: 9px 11px;
  background: var(--bg-elevated);
  border: 1px solid var(--bg-border);
  border-radius: 6px;
  color: var(--text-primary);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: var(--text-base);
  transition: border-color 0.14s;
  outline: none;
}

input[type="text"]::placeholder,
input[type="email"]::placeholder,
input[type="tel"]::placeholder,
textarea::placeholder {
  color: var(--text-disabled);
}

input[type="text"]:focus,
input[type="email"]:focus,
input[type="tel"]:focus,
input[type="date"]:focus,
textarea:focus,
select:focus {
  border-color: var(--accent);
}

textarea {
  resize: vertical;
  min-height: 80px;
  font-size: var(--text-base);
  line-height: var(--lh-base);
}

/* BUTTONS */
.btn {
  padding: 8px 16px;
  border: 1px solid var(--bg-border);
  border-radius: 6px;
  font-size: var(--text-sm);
  font-weight: 500;
  cursor: pointer;
  transition: all 0.14s;
  background: var(--bg-elevated);
  color: var(--text-primary);
  font-family: 'Inter', system-ui, sans-serif;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn:hover {
  background: var(--bg-border);
}

.btn.primary {
  background: var(--accent);
  color: var(--bg-base);
  border-color: var(--accent);
}

.btn.primary:hover {
  background: var(--accent-hover);
  border-color: var(--accent-hover);
}

.btn.danger {
  background: var(--color-red-dim);
  color: var(--color-red);
  border-color: var(--color-red);
}

.btn.danger:hover {
  background: rgba(224, 82, 82, 0.25);
}

.btn.small {
  padding: 5px 10px;
  font-size: var(--text-xs);
}

.btn-icon {
  width: 28px;
  height: 28px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.btn-icon svg {
  width: 14px;
  height: 14px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.6;
}

/* MODALS */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 100;
  display: flex;
  align-items: flex-end;
}

.modal-overlay.center {
  align-items: center;
  justify-content: center;
}

.modal {
  background: var(--bg-surface);
  border: 1px solid var(--bg-border);
  border-radius: 12px 12px 0 0;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp 0.2s cubic-bezier(0.16, 1, 0.3, 1);
}

.modal.center {
  border-radius: 12px;
  max-height: 90vh;
  max-width: 500px;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  border-bottom: 1px solid var(--bg-border);
  min-height: 50px;
}

.modal-header h2 {
  font-size: var(--text-md);
  font-weight: 600;
  color: var(--text-primary);
}

.modal-close {
  width: 28px;
  height: 28px;
  border: 1px solid var(--bg-border);
  background: var(--bg-elevated);
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;

<script>
// CONSTANTS
const SUPABASE_URL = 'https://qxjdwafkntlgiytdxeaf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_AnpuVpUdk7ggC435BgdvNQ_aRFl6Yh_';
const AUTH_ENABLED = true;

// STATE
const S = {
  supabase: null,
  user: null,
  view: 'Today',
  contacts: [],
  deals: [],
  tasks: [],
  interactions: [],
  intel: [],
  ideas: [],
  contactSearch: '',
  taskSearch: '',
  intelSearch: '',
  editingTaskId: null,
};

// INIT
async function init() {
  try {
    S.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const { data: { session }, error } = await S.supabase.auth.getSession();
    if (error || !session) {
      showAuthGate();
    } else {
      S.user = session.user;
      showApp();
      await loadAll();
      setupRealtime();
      setupUI();
    }
  } catch (e) {
    console.error('Init error:', e);
    showAuthGate();
  }
}

// AUTH
function showAuthGate() {
  document.getElementById('authGate').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('authBtn').onclick = authSignIn;
  document.getElementById('authPass').onkeypress = (e) => {
    if (e.key === 'Enter') authSignIn();
  };
}

async function authSignIn() {
  const email = document.getElementById('authEmail').value.trim();
  const pass = document.getElementById('authPass').value;
  const errEl = document.getElementById('authErr');
  errEl.textContent = '';

  if (!email || !pass) {
    errEl.textContent = 'Email and password required';
    return;
  }

  try {
    const { data, error } = await S.supabase.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    S.user = data.user;
    showApp();
    await loadAll();
    setupRealtime();
    setupUI();
  } catch (e) {
    errEl.textContent = e.message || 'Sign in failed. Try leo@vantage.system / test';
  }
}

function authSignOut() {
  S.supabase.auth.signOut().then(() => {
    S.user = null;
    location.reload();
  });
}

function showApp() {
  document.getElementById('authGate').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

// LOAD DATA
async function loadAll() {
  try {
    const [contacts, deals, tasks, interactions, intel] = await Promise.all([
      S.supabase.from('contacts').select('*'),
      S.supabase.from('deals').select('*'),
      S.supabase.from('tasks').select('*'),
      S.supabase.from('interactions').select('*'),
      S.supabase.from('intel_records').select('*'),
    ]);

    if (contacts.data) S.contacts = contacts.data;
    if (deals.data) S.deals = deals.data;
    if (tasks.data) S.tasks = tasks.data;
    if (interactions.data) S.interactions = interactions.data;
    if (intel.data) S.intel = intel.data;

    updateBadges();
    render();
  } catch (e) {
    console.error('Load error:', e);
  }
}

// REALTIME
function setupRealtime() {
  S.supabase.channel('db-changes').on(
    'postgres_changes',
    { event: '*', schema: 'public', table: 'contacts' },
    (payload) => {
      if (payload.eventType === 'INSERT') {
        S.contacts.push(payload.new);
      } else if (payload.eventType === 'UPDATE') {
        const idx = S.contacts.findIndex(c => c.id === payload.new.id);
        if (idx >= 0) S.contacts[idx] = payload.new;
      } else if (payload.eventType === 'DELETE') {
        S.contacts = S.contacts.filter(c => c.id !== payload.old.id);
      }
      if (S.view === 'CRM') renderCRMView();
      updateBadges();
    }
  ).on(
    'postgres_changes',
    { event: '*', schema: 'public', table: 'deals' },
    (payload) => {
      if (payload.eventType === 'INSERT') {
        S.deals.push(payload.new);
      } else if (payload.eventType === 'UPDATE') {
        const idx = S.deals.findIndex(d => d.id === payload.new.id);
        if (idx >= 0) S.deals[idx] = payload.new;
      } else if (payload.eventType === 'DELETE') {
        S.deals = S.deals.filter(d => d.id !== payload.old.id);
      }
      if (S.view === 'Deals' || S.view === 'Today') render();
      updateBadges();
    }
  ).on(
    'postgres_changes',
    { event: '*', schema: 'public', table: 'tasks' },
    (payload) => {
      if (payload.eventType === 'INSERT') {
        S.tasks.push(payload.new);
      } else if (payload.eventType === 'UPDATE') {
        const idx = S.tasks.findIndex(t => t.id === payload.new.id);
        if (idx >= 0) S.tasks[idx] = payload.new;
      } else if (payload.eventType === 'DELETE') {
        S.tasks = S.tasks.filter(t => t.id !== payload.old.id);
      }
      if (S.view === 'Actions' || S.view === 'Today') render();
      updateBadges();
    }
  ).on(
    'postgres_changes',
    { event: '*', schema: 'public', table: 'intel_records' },
    (payload) => {
      if (payload.eventType === 'INSERT') {
        S.intel.push(payload.new);
      } else if (payload.eventType === 'UPDATE') {
        const idx = S.intel.findIndex(i => i.id === payload.new.id);
        if (idx >= 0) S.intel[idx] = payload.new;
      } else if (payload.eventType === 'DELETE') {
        S.intel = S.intel.filter(i => i.id !== payload.old.id);
      }
      if (S.view === 'Market') renderMarketView();
      updateBadges();
    }
  ).subscribe();
}

// UPDATE BADGES
function updateBadges() {
  document.getElementById('navBadgeContacts').textContent = S.contacts.length;
  document.getElementById('navBadgeTasks').textContent = S.tasks.filter(t => t.status !== 'Completed').length;
  document.getElementById('navBadgeDeals').textContent = S.deals.length;
  document.getElementById('navBadgeIntel').textContent = S.intel.length;
}

// SETUP UI
function setupUI() {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.onclick = () => {
      document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      S.view = el.dataset.view;
      updateHeader();
      render();
    };
  });

  document.getElementById('collapseBtn').onclick = () => {
    document.getElementById('sidebar').classList.toggle('collapsed');
  };

  document.getElementById('refreshBtn').onclick = loadAll;
  document.getElementById('fab').onclick = showCaptureModal;
  document.getElementById('logoutBtn').onclick = authSignOut;
}

// HEADER
function updateHeader() {
  document.getElementById('headerTitle').textContent = S.view;
}

// RENDER
function render() {
  const inner = document.getElementById('contentInner');
  inner.innerHTML = '';

  if (S.view === 'Today') {
    renderToday();
  } else if (S.view === 'CRM') {
    renderCRMView();
  } else if (S.view === 'Actions') {
    renderActionsView();
  } else if (S.view === 'Deals') {
    renderDealsView();
  } else if (S.view === 'Market') {
    renderMarketView();
  } else if (S.view === 'Strategy') {
    renderStrategyView();
  } else if (S.view === 'Knowledge') {
    renderKnowledgeView();
  }
}

// TODAY VIEW
function renderToday() {
  const inner = document.getElementById('contentInner');
  inner.classList.remove('two-col', 'full-width');
  inner.classList.add('two-col');

  const html = `
    <div class="card" style="grid-column: 1/-1;">
      <div class="card-header"><h2 class="card-title">Today's Commitments</h2></div>
      <div class="card-body">
        <div style="padding: 16px; text-align: center; color: var(--text-secondary);">
          <p style="font-size: var(--text-base); margin-bottom: 12px;">No briefing selected yet.</p>
          <button class="btn primary" onclick="showBriefingModal()">Start Today's Briefing</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h2 class="card-title">Active Pipeline</h2></div>
      <div class="card-body"><div style="padding: 16px; text-align: center; font-size: var(--text-xl); font-weight: 600; color: var(--accent);">${S.deals.filter(d => ['In Pursuit', 'In DD', 'IC Stage'].includes(d.deal_stage)).length}</div></div>
    </div>

    <div class="card">
      <div class="card-header"><h2 class="card-title">Open Actions</h2></div>
      <div class="card-body"><div style="padding: 16px; text-align: center; font-size: var(--text-xl); font-weight: 600; color: var(--accent);">${S.tasks.filter(t => t.status !== 'Completed').length}</div></div>
    </div>

    <div class="card">
      <div class="card-header"><h2 class="card-title">Deals in DD</h2></div>
      <div class="card-body"><div style="padding: 16px; text-align: center; font-size: var(--text-xl); font-weight: 600; color: var(--accent);">${S.deals.filter(d => d.deal_stage === 'In DD').length}</div></div>
    </div>

    <div class="card">
      <div class="card-header"><h2 class="card-title">Open CRM</h2></div>
      <div class="card-body">${renderContactsList(S.contacts.slice(0, 5))}</div>
    </div>

    <div class="card">
      <div class="card-header"><h2 class="card-title">Recent Intel</h2></div>
      <div class="card-body">
        ${S.intel.length === 0 ? '<div style="padding: 16px; color: var(--text-tertiary); font-size: var(--text-sm);">No intel records yet</div>' : S.intel.slice(0, 5).map(i => `<div class="row"><div class="row-primary">${i.summary || 'Untitled'}</div><div class="row-meta">${new Date(i.intel_date).toLocaleDateString()}</div></div>`).join('')}
      </div>
    </div>
  `;

  inner.innerHTML = html;
}

// CRM VIEW
function renderCRMView() {
  const inner = document.getElementById('contentInner');
  inner.classList.add('full-width');

  const filtered = filterContacts();
  const html = `
    <div class="card" style="grid-column: 1/-1;">
      <div class="card-header"><h2 class="card-title">Contacts</h2></div>
      <div class="card-body">
        <div style="padding: 12px 16px;">
          <input type="text" placeholder="Search contacts..." id="contactSearch" style="width: 100%; font-size: var(--text-base);" value="${S.contactSearch}">
        </div>
        ${renderContactsList(filtered)}
      </div>
    </div>
  `;

  inner.innerHTML = html;

  const searchEl = document.getElementById('contactSearch');
  searchEl.oninput = (e) => {
    S.contactSearch = e.target.value;
    const parent = searchEl.closest('.card-body');
    const filtered2 = filterContacts();
    parent.innerHTML = '<div style="padding: 12px 16px;"><input type="text" placeholder="Search contacts..." id="contactSearch" style="width: 100%; font-size: var(--text-base);" value="' + S.contactSearch + '"></div>' + renderContactsList(filtered2);
    document.getElementById('contactSearch').oninput = arguments.callee;
    document.getElementById('contactSearch').focus();
  };

  searchEl.focus();
}

function filterContacts() {
  if (!S.contactSearch) return S.contacts;
  const q = S.contactSearch.toLowerCase();
  return S.contacts.filter(c =>
    (c.name && c.name.toLowerCase().includes(q)) ||
    (c.email && c.email.toLowerCase().includes(q)) ||
    (c.firm && c.firm.toLowerCase().includes(q))
  );
}

function getContactTypeColor(type) {
  const map = {
    'Agent': {color:'var(--color-blue)',dim:'var(--color-blue-dim)'},
    'Valuer': {color:'var(--color-purple)',dim:'var(--color-purple-dim)'},
    'Investor': {color:'var(--color-gold)',dim:'var(--color-gold-dim)'},
    'Financier (Debt)': {color:'var(--color-teal)',dim:'var(--color-teal-dim)'},
    'Financier (Equity)': {color:'var(--color-cyan)',dim:'var(--color-cyan-dim)'},
    'Lawyer': {color:'var(--color-orange)',dim:'var(--color-orange-dim)'},
    'Advisor': {color:'var(--color-pink)',dim:'var(--color-pink-dim)'},
    'Consultant': {color:'var(--color-amber)',dim:'var(--color-amber-dim)'},
    'Government / Approvals': {color:'var(--color-sage)',dim:'var(--color-sage-dim)'},
    'Former Employer': {color:'var(--color-slate)',dim:'var(--color-slate-dim)'},
    'Personal': {color:'var(--color-gold)',dim:'var(--color-gold-dim)'},
  };
  // Fallback: infer from legacy firm_type
  if (!map[type]) {
    if (/agent|agency|cbre|jll|colliers|savills|cushman|knight frank/i.test(type||'')) return map['Agent'];
    if (/valu/i.test(type||'')) return map['Valuer'];
    if (/fund|super|invest|reit|asset manag/i.test(type||'')) return map['Investor'];
    if (/bank|debt|lend/i.test(type||'')) return map['Financier (Debt)'];
    if (/law|legal|solicitor/i.test(type||'')) return map['Lawyer'];
    return {color:'var(--color-slate)',dim:'var(--color-slate-dim)'};
  }
  return map[type];
}

function renderContactRow(c) {
  const typeLabel = c.contact_type || c.firm_type || '';
  const tc = getContactTypeColor(typeLabel);
  const badge = typeLabel ? `<span style="background:${tc.dim};color:${tc.color};border:1px solid ${tc.color}33;padding:2px 7px;border-radius:4px;font-size:var(--text-xs);font-weight:500;white-space:nowrap;flex-shrink:0;">${typeLabel.length > 14 ? typeLabel.slice(0,13)+'…' : typeLabel}</span>` : '';
  return `
    <div class="row clickable" onclick="showContactDetail('${c.id}')">
      <div style="flex: 1; min-width: 0;">
        <div class="row-primary">${c.name || 'Untitled'}</div>
        <div class="row-secondary">${[c.firm, c.role_title].filter(Boolean).join(' · ')}</div>
        ${c.city ? `<div class="row-meta">${c.city}${c.state ? ', ' + c.state : ''}</div>` : ''}

      ${badge}

function renderContactsList(contacts) {
  if (contacts.length === 0) {
    return '<div style="padding: 16px; color: var(--text-tertiary); text-align: center;">No contacts found</div>';
  }
  const tierGroups = [
    { tier: 1, label: 'Tier 1 — Core', id: 'contact-tier-1' },
    { tier: 2, label: 'Tier 2 — Network', id: 'contact-tier-2' },
    { tier: 3, label: 'Tier 3 — Peripheral', id: 'contact-tier-3' },
    { tier: 0, label: 'Untiered', id: 'contact-tier-0' },
  ];
  const sections = tierGroups.map(({ tier, label, id }) => {
    const group = tier === 0
      ? contacts.filter(c => !c.relationship_tier)
      : contacts.filter(c => c.relationship_tier === tier);
    if (group.length === 0) return '';
    const collapsed = initSectionState(id, false);
    return `
      <div id="${id}" style="border-bottom: 1px solid var(--bg-border);">
        <div onclick="toggleSection('${id}')" style="display:flex;align-items:center;justify-content:space-between;padding:8px 16px;cursor:pointer;user-select:none;">
          <span style="font-size:var(--text-sm);font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.06em;">${label}</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:var(--text-xs);color:var(--text-tertiary);">${group.length}</span>
            <button class="toggle-btn ${collapsed ? 'collapsed' : ''}" style="pointer-events:none;">
              <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9" stroke="currentColor" fill="none"/></svg>
            </button>
          </div>
        </div>
        <div class="section-body" style="${collapsed ? 'display:none;' : ''}">
          ${group.map(c => renderContactRow(c)).join('')}
        </div>
      </div>
    `;
  }).join('');
  return sections || '<div style="padding: 16px; color: var(--text-tertiary); text-align: center;">No contacts found</div>';
}

// ACTIONS VIEW
function renderActionsView() {
  const inner = document.getElementById('contentInner');
  inner.classList.add('full-width');

  const sorted = S.tasks.slice().sort((a, b) => {
    const priorityOrder = { 'High': 0, 'Medium': 1, 'Low': 2 };
    const aPrio = priorityOrder[a.importance] || 2;
    const bPrio = priorityOrder[b.importance] || 2;
    if (aPrio !== bPrio) return aPrio - bPrio;
    if (a.deadline_date && b.deadline_date) return new Date(a.deadline_date) - new Date(b.deadline_date);
    return new Date(b.date_logged || 0) - new Date(a.date_logged || 0);
  });

  const html = `
    <div class="card" style="grid-column: 1/-1;">
      <div class="card-header"><h2 class="card-title">Tasks</h2></div>
      <div class="card-body">
        ${sorted.map(t => `
          <div class="row clickable" onclick="showTaskEdit('${t.id}')" id="task-${t.id}">
            <div style="flex: 1;">
              <div class="row-primary">${t.task || 'Untitled'}</div>
              <div class="row-secondary">${t.category || ''}</div>
            </div>
            <div class="row-badge" style="background: ${getPriorityColor(t.importance).dim}; color: ${getPriorityColor(t.importance).color}; border: 1px solid ${getPriorityColor(t.importance).color}33;">${t.importance || 'Low'}</div>
          </div>
          <div id="task-edit-${t.id}"></div>
        `).join('')}
      </div>
    </div>
  `;

  inner.innerHTML = html;
}

        </div>
        <div style="flex:1; overflow-y:auto; padding:6px;">
          ${ideas.length === 0
            ? `<div style="padding:40px 20px;text-align:center;color:var(--text-tertiary);">

function selectIdea(ideaId) {
  const idea = (S.ideas || []).find(i => i.id === ideaId);
  if (!idea) return;
  S._selectedIdeaId = ideaId;
  const subtype = idea.idea_type || idea.subtype || 'Other';
  const subtypeColors = {'Thesis':'var(--color-purple)','Sourcing':'var(--color-blue)','Market View':'var(--color-teal)','Capital':'var(--color-gold)','Relationship':'var(--color-pink)','IC Narrative':'var(--color-orange)','Other':'var(--color-slate)'};
  const subtypeDims = {'Thesis':'var(--color-purple-dim)','Sourcing':'var(--color-blue-dim)','Market View':'var(--color-teal-dim)','Capital':'var(--color-gold-dim)','Relationship':'var(--color-pink-dim)','IC Narrative':'var(--color-orange-dim)','Other':'var(--color-slate-dim)'};
  const c = subtypeColors[subtype] || 'var(--color-slate)';
  const d = subtypeDims[subtype] || 'var(--color-slate-dim)';
  const date = idea.created_at ? new Date(idea.created_at).toLocaleString('en-AU', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
  document.getElementById('ideaDetail').innerHTML = `
    <div style="max-width:600px; width:100%;">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:18px;">
        <span style="background:${d};color:${c};border:1px solid ${c}33;padding:3px 10px;border-radius:4px;font-size:var(--text-xs);font-weight:500;">${subtype}</span>
        <span style="font-size:var(--text-xs);color:var(--text-tertiary);">${date}</span>
      </div>
      <div style="font-size:var(--text-base);color:var(--text-primary);line-height:var(--lh-loose);white-space:pre-wrap;">${idea.content || ''}</div>
    </div>
  `;
}

function toggleStrategyPill(btn) {
  const strategy = btn.dataset.strategy;
  const c = getStrategyColor(strategy);
  const hiddenInput = document.getElementById('dealStrategy');
  let selected = hiddenInput.value ? hiddenInput.value.split(',').filter(Boolean) : [];
  if (selected.includes(strategy)) {
    selected = selected.filter(s => s !== strategy);
    btn.style.background = c.dim;
    btn.style.color = c.color;
  } else {
    selected.push(strategy);
    btn.style.background = c.color;
    btn.style.color = '#fff';
  }
  hiddenInput.value = selected.join(',');
}

async function saveDeal(dealId) {

    asset_address: document.getElementById('dealAddr').value,

    asset_class: document.getElementById('dealAssetClass').value,
    geography: document.getElementById('dealGeography').value,
    headline_price: document.getElementById('dealPrice').value,
    gla_sqm: parseFloat(document.getElementById('dealGLA').value) || null,
    site_area_sqm: parseFloat(document.getElementById('dealSiteArea').value) || null,
    passing_income: parseFloat(document.getElementById('dealPassingIncome').value) || null,
    yield_pct: parseFloat(document.getElementById('dealYield').value) || null,
    asset_strategy: assetStrategy.length > 0 ? assetStrategy : null,
    key_terms: document.getElementById('dealTerms').value,
  };

  try {
    const { error } = await S.supabase.from('deals').update(data).eq('id', dealId);

    document.querySelector('.modal-overlay').remove();
    await loadAll();

    alert('Error saving deal: ' + e.message);

}

    panel.innerHTML = '';
    S.editingTaskId = null;
    return;
  }

  const html = `
    <div class="inline-edit-panel">
      <div class="input-group">

          <button class="pill" style="background: ${task.importance === 'Low' ? 'var(--color-slate)' : 'var(--color-slate-dim)'}; color: ${task.importance === 'Low' ? '#fff' : 'var(--color-slate)'}; border: none; cursor: pointer; padding: 6px 10px;" onclick="document.getElementById('taskPrio').value = 'Low'; updatePriorityButtons('Low');">Low</button>

        <input type="hidden" id="taskPrio" value="${task.importance || 'Low'}">
      </div>

        <input type="date" id="taskDue" value="${task.deadline_date ? task.deadline_date.split('T')[0] : ''}" style="font-size: var(--text-base);">
      </div>
      <div class="input-group">
        <label class="input-label">Linked Deal</label>
        <input type="text" id="taskDealSearch" placeholder="Search deals..." value="${deal ? deal.deal_name : ''}" style="font-size: var(--text-base);">
        <div id="taskDealDropdown" style="margin-top: 4px; display: none; background: var(--bg-base); border: 1px solid var(--bg-border); border-radius: 4px; max-height: 200px; overflow-y: auto;"></div>
        <input type="hidden" id="taskDealId" value="${task.deal_id || ''}">
      </div>
      <div class="input-group">
        <label class="input-label">Notes</label>
        <textarea id="taskNotes" placeholder="Additional notes..." style="font-size: var(--text-base);">${task.notes || ''}</textarea>
      </div>
      <div style="display: flex; gap: 8px; margin-top: 12px;">
        <button class="btn primary" onclick="saveTask('${taskId}')">Save</button>
        <button class="btn" onclick="markTaskComplete('${taskId}')">Complete</button>
        <button class="btn danger" onclick="if(confirm('Delete this task?')) deleteTask('${taskId}')">Delete</button>
      </div>
    </div>
  `;

  panel.innerHTML = html;

  const dealSearch = document.getElementById('taskDealSearch');
  const dealDropdown = document.getElementById('taskDealDropdown');

  dealSearch.oninput = () => {
    const q = dealSearch.value.toLowerCase();
    const matches = S.deals.filter(d => d.deal_name && d.deal_name.toLowerCase().includes(q)).slice(0, 5);

    if (q.length > 0 && matches.length > 0) {
      dealDropdown.innerHTML = matches.map(d => `
        <div style="padding: 8px; cursor: pointer; border-bottom: 1px solid var(--bg-border);" onclick="document.getElementById('taskDealId').value = '${d.id}'; document.getElementById('taskDealSearch').value = '${d.deal_name}'; document.getElementById('taskDealDropdown').style.display = 'none';">
          ${d.deal_name}
        </div>
      `).join('');
      dealDropdown.style.display = 'block';
    } else {
      dealDropdown.style.display = 'none';
    }
  };
}

function updatePriorityButtons(selected) {
  const buttons = document.querySelectorAll('.inline-edit-panel .pill');
  buttons.forEach(btn => {
    const text = btn.textContent.trim();
    if (text === selected) {
      if (selected === 'High') {
        btn.style.background = 'var(--color-red)';
        btn.style.color = '#fff';
      } else if (selected === 'Medium') {
        btn.style.background = 'var(--color-amber)';
        btn.style.color = '#fff';
      } else {
        btn.style.background = 'var(--color-slate)';
        btn.style.color = '#fff';
      }
    } else {
      if (text === 'High') {
        btn.style.background = 'var(--color-red-dim)';
        btn.style.color = 'var(--color-red)';
      } else if (text === 'Medium') {
        btn.style.background = 'var(--color-amber-dim)';
        btn.style.color = 'var(--color-amber)';
      } else {
        btn.style.background = 'var(--color-slate-dim)';
        btn.style.color = 'var(--color-slate)';
      }
    }
  });
}

    } else if (type === 'note') {
      const { error } = await S.supabase.from('intel_records').insert([{

        source: 'Capture',

// SECTION COLLAPSE / EXPAND
function toggleSection(sectionId) {
  const section = document.getElementById(sectionId);
  if (!section) return;
  const body = section.querySelector('.section-body');
  const btn = section.querySelector('.toggle-btn');
  if (!body) return;
  const isNowCollapsed = body.style.display !== 'none';
  body.style.display = isNowCollapsed ? 'none' : '';
  if (btn) btn.classList.toggle('collapsed', isNowCollapsed);
  try {
    const st = JSON.parse(sessionStorage.getItem('vantage_sections') || '{}');
    st[sectionId] = isNowCollapsed;
    sessionStorage.setItem('vantage_sections', JSON.stringify(st));
  } catch(e) {}
}

function initSectionState(sectionId, defaultCollapsed) {
  if (defaultCollapsed === undefined) defaultCollapsed = false;
  try {
    const st = JSON.parse(sessionStorage.getItem('vantage_sections') || '{}');
    return sectionId in st ? st[sectionId] : defaultCollapsed;
  } catch(e) { return defaultCollapsed; }
}

// COLORS
function getPriorityColor(priority) {
  switch(priority) {
    case 'High': return { color: 'var(--color-red)', dim: 'var(--color-red-dim)' };
    case 'Medium': return { color: 'var(--color-amber)', dim: 'var(--color-amber-dim)' };
    default: return { color: 'var(--color-slate)', dim: 'var(--color-slate-dim)' };
  }
}

function getDealStageColor(stage) {
  const colors = {
    'Monitoring': { color: 'var(--color-slate)', dim: 'var(--color-slate-dim)' },
    'Watching': { color: 'var(--color-slate)', dim: 'var(--color-slate-dim)' },
    'Identified': { color: 'var(--color-slate)', dim: 'var(--color-slate-dim)' },
    'In Pursuit': { color: 'var(--color-blue)', dim: 'var(--color-blue-dim)' },
    'In DD': { color: 'var(--color-orange)', dim: 'var(--color-orange-dim)' },
    'IC Stage': { color: 'var(--color-purple)', dim: 'var(--color-purple-dim)' },
    'Completed': { color: 'var(--color-green)', dim: 'var(--color-green-dim)' },
    'Settled': { color: 'var(--color-green)', dim: 'var(--color-green-dim)' },
    'Dead': { color: 'var(--color-red)', dim: 'var(--color-red-dim)' },
    'Withdrawn': { color: 'var(--color-red)', dim: 'var(--color-red-dim)' },
    'On Hold': { color: 'var(--color-amber)', dim: 'var(--color-amber-dim)' },
  };
  return colors[stage] || { color: 'var(--color-slate)', dim: 'var(--color-slate-dim)' };
}

function getConfidenceColor(confidence) {
  switch(confidence) {
    case 'Confirmed': return { color: 'var(--color-green)', dim: 'var(--color-green-dim)' };
    case 'Reported': return { color: 'var(--color-blue)', dim: 'var(--color-blue-dim)' };
    case 'Indicative': return { color: 'var(--color-amber)', dim: 'var(--color-amber-dim)' };
    case 'Speculated': return { color: 'var(--color-orange)', dim: 'var(--color-orange-dim)' };
    default: return { color: 'var(--color-slate)', dim: 'var(--color-slate-dim)' };
  }
}

function getStrategyColor(strategy) {
  const colors = {
    'Core': { color: 'var(--color-green)', dim: 'var(--color-green-dim)' },
    'Core+': { color: 'var(--color-cyan)', dim: 'var(--color-cyan-dim)' },
    'Value-Add': { color: 'var(--color-orange)', dim: 'var(--color-orange-dim)' },
    'Development': { color: 'var(--color-purple)', dim: 'var(--color-purple-dim)' },
    'Opportunistic': { color: 'var(--color-pink)', dim: 'var(--color-pink-dim)' },
    'Special Situation': { color: 'var(--color-teal)', dim: 'var(--color-teal-dim)' },
    'M&A': { color: 'var(--color-gold)', dim: 'var(--color-gold-dim)' },
  };
  return colors[strategy] || { color: 'var(--color-slate)', dim: 'var(--color-slate-dim)' };
}

init();
